server:
  port: 8080
  servlet:
    context-path: /

spring:
  web:
    resources:
      static-locations: classpath:/META-INF/resources/, classpath:/resources/, classpath:/static/, classpath:/public/, classpath:/upload/
  application:
    name: 智学云在线学习平台
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  minio:
    enabled: true
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:cloud-learn-exp04}
    presign-expiry-seconds: ${MINIO_PRESIGN_EXPIRY_SECONDS:3600}
  security:
    jwt:
      issuer: cloud-learn-exp04
      secret: ${JWT_SECRET:cloud-learn-exp04-change-me-please-32bytes-min}
      access-token-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600}

logging:
  level:
    cs.sbs.web: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
